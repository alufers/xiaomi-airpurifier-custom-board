name: KiCad CI

on:
  push:
  pull_request:
  release:
    types: [created]

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install KiCad 10
        run: |
          sudo add-apt-repository --yes ppa:kicad/kicad-10.0-releases
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y kicad

      - name: Compute revision info
        id: rev
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            REVISION="${{ github.ref_name }}"
          else
            REVISION="$SHORT_SHA"
          fi
          REPO_URL="https://github.com/${{ github.repository }}"
          REPO_NAME="${{ github.repository }}"
          REPO_NAME="${REPO_NAME##*/}"
          echo "revision=$REVISION"                           >> "$GITHUB_OUTPUT"
          echo "repo_name=$REPO_NAME"                        >> "$GITHUB_OUTPUT"
          echo "repo_link=${REPO_URL#https://}"               >> "$GITHUB_OUTPUT"
          echo "revision_link=$REPO_URL/commit/$SHORT_SHA"   >> "$GITHUB_OUTPUT"

      - name: Run DRC (errors only)
        run: |
          set +e
          kicad-cli pcb drc \
            --severity-error \
            --exit-code-violations \
            --refill-zones \
            --format json \
            --output drc-report.json \
            xiaomi-airpurifier-custom-board/xiaomi-airpurifier-custom-board.kicad_pcb
          DRC_EXIT=$?
          set -e

          if [[ -f drc-report.json ]]; then
            VIOLATION_COUNT=$(jq '.violations | length' drc-report.json)
            if [[ "$VIOLATION_COUNT" -gt 0 ]]; then
              echo "::error::DRC found $VIOLATION_COUNT error(s):"
              jq -r '.violations[] |
                "[\(.severity | ascii_upcase)] \(.description)" +
                if (.items | length) > 0 then
                  "\n" + (.items | map("  → \(.description // "")") | join("\n"))
                else "" end' drc-report.json
            else
              echo "DRC passed with no errors."
            fi
          fi

          exit $DRC_EXIT

      - name: Export schematic PDF
        run: |
          mkdir -p docs
          kicad-cli sch export pdf \
            -D "CI_BOARD_REPO_LINK=${{ steps.rev.outputs.repo_link }}" \
            -D "CI_BOARD_REVISION=${{ steps.rev.outputs.revision }}" \
            -D "CI_BOARD_REVISION_LINK=${{ steps.rev.outputs.revision_link }}" \
            --output docs/schematic.pdf \
            xiaomi-airpurifier-custom-board/xiaomi-airpurifier-custom-board.kicad_sch

      - name: Export BOM
        run: |
          kicad-cli sch export bom \
            --fields "Reference,Value,Footprint,QUANTITY,DNP,Datasheet" \
            --labels "Refs,Value,Footprint,Qty,DNP,Datasheet" \
            --group-by "Value,Footprint" \
            --sort-field "Reference" \
            --output docs/bom.csv \
            xiaomi-airpurifier-custom-board/xiaomi-airpurifier-custom-board.kicad_sch

      - name: Export pick and place
        run: |
          kicad-cli pcb export pos \
            --format csv \
            --units mm \
            --output docs/pick-and-place.csv \
            xiaomi-airpurifier-custom-board/xiaomi-airpurifier-custom-board.kicad_pcb

      - name: Export gerbers and drill files
        run: |
          mkdir -p gerbers
          kicad-cli pcb export gerbers \
            --board-plot-params \
            -D "CI_BOARD_REPO_LINK=${{ steps.rev.outputs.repo_link }}" \
            -D "CI_BOARD_REVISION=${{ steps.rev.outputs.revision }}" \
            -D "CI_BOARD_REVISION_LINK=${{ steps.rev.outputs.revision_link }}" \
            --output gerbers/ \
            xiaomi-airpurifier-custom-board/xiaomi-airpurifier-custom-board.kicad_pcb
          kicad-cli pcb export drill \
            --excellon-separate-th \
            --output gerbers/ \
            xiaomi-airpurifier-custom-board/xiaomi-airpurifier-custom-board.kicad_pcb

      - name: Checkout InteractiveHtmlBom
        uses: actions/checkout@v4
        with:
          repository: openscopeproject/InteractiveHtmlBom
          path: ibom-tool

      - name: Generate Interactive HTML BOM
        run: |
          PCBNEW_SO=$(find /usr -name "pcbnew.so" 2>/dev/null | head -1)
          [[ -n "$PCBNEW_SO" ]] && export PYTHONPATH="$(dirname "$PCBNEW_SO")"
          python3 ibom-tool/generate_interactive_bom.py \
            --no-browser \
            --dest-dir docs \
            --name-format ibom \
            xiaomi-airpurifier-custom-board/xiaomi-airpurifier-custom-board.kicad_pcb

      - name: Upload gerbers artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rev.outputs.repo_name }}-gerbers-${{ steps.rev.outputs.revision }}
          path: gerbers/

      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rev.outputs.repo_name }}-docs-${{ steps.rev.outputs.revision }}
          path: docs/

      - name: Package zips for release
        if: github.event_name == 'release'
        run: |
          REPO_NAME="${{ steps.rev.outputs.repo_name }}"
          REVISION="${{ steps.rev.outputs.revision }}"
          cd gerbers && zip -r "../${REPO_NAME}-gerbers-${REVISION}.zip" . && cd ..
          cd docs    && zip -r "../${REPO_NAME}-docs-${REVISION}.zip"    . && cd ..

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.rev.outputs.repo_name }}-gerbers-${{ steps.rev.outputs.revision }}.zip
            ${{ steps.rev.outputs.repo_name }}-docs-${{ steps.rev.outputs.revision }}.zip
