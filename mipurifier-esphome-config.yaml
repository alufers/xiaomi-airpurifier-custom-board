esphome:
  name: mipurifier-sypialnia
  friendly_name: mipurifier-sypialnia
  on_boot:
    priority: -100
    then:
      - lambda: id(out_fan).set_level(0.0f);
      - script.execute: update_air_quality_leds
      - script.execute: update_mode_leds

globals:
  - id: mode_setting_speed
    type: bool
    restore_value: no
    initial_value: "false"
  - id: fan_was_on
    type: bool
    restore_value: no
    initial_value: "false"
  - id: animation_step
    type: int
    restore_value: no
    initial_value: "0"

external_components:
  - source:
      type: git
      url: https://github.com/lk-ek/esphome-pm1003ph
      ref: main

esp32:
  board: esp32-c6-devkitc-1
  framework:
    type: esp-idf

logger:
  level: INFO

prometheus:

mqtt:
  broker: !secret mqtt_host
  username: !secret mqtt_user
  password: !secret mqtt_password

wifi:
  id: wifi_component_id
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${name} Fallback"
    password: !secret fallback_password
  on_connect:
    - output.turn_on: out_wifi_led
  on_disconnect:
    - output.turn_off: out_wifi_led

ota:
  id: my_ota
  platform: esphome
  password: !secret ota_password
  on_begin:
    then:
      - fan.turn_off: fan_component

captive_portal:

web_server:
  port: 80
  version: 3
  local: true
  sorting_groups:
    - id: sorting_group_fan
      name: "Fan"
      sorting_weight: 10
    - id: sorting_group_environmental
      name: "Environmental"
      sorting_weight: 20
    - id: sorting_group_radar
      name: "LD2410 Radar"
      sorting_weight: 30
    - id: sorting_group_leds
      name: "LEDs and Buttons"
      sorting_weight: 40

i2c:
  sda: GPIO6
  scl: GPIO7
  scan: true

uart:
  - id: uart_ld2410
    tx_pin: GPIO18
    rx_pin: GPIO19
    baud_rate: 256000
    parity: NONE
    stop_bits: 1

tca9555:
  - id: tca9555_hub
    address: 0x20

ld2410:
  uart_id: uart_ld2410

script:
  - id: update_air_quality_leds
    then:
      - lambda: |
          bool enable = id(led_enable).state && id(fan_component).state;
          float pm25 = id(pm25_sensor).state;

          std::string quality = "Unknown";
          if (!isnan(pm25)) {
            if (pm25 < 10.0f) quality = "Excellent";
            else if (pm25 < 25.0f) quality = "Good";
            else quality = "Bad";
          }
          id(air_quality_text).publish_state(quality);

          if (enable && !isnan(pm25)) {
            pm25 < 10.0f ? id(out_led_excellent)->turn_on() : id(out_led_excellent)->turn_off();
            (pm25 >= 10.0f && pm25 < 25.0f) ? id(out_led_good)->turn_on() : id(out_led_good)->turn_off();
            pm25 >= 25.0f ? id(out_led_bad)->turn_on() : id(out_led_bad)->turn_off();
          } else {
            id(out_led_excellent)->turn_off();
            id(out_led_good)->turn_off();
            id(out_led_bad)->turn_off();
          }

  - id: update_mode_leds
    then:
      - lambda: |
          bool enable = id(led_enable).state && id(fan_component).state;
          if (!enable) {
            id(out_auto_led)->turn_off();
            id(out_sleep_led)->turn_off();
            id(out_manual_led)->turn_off();
            return;
          }
          auto mode = id(fan_mode)->current_option();
          if (mode == "Auto") {
            id(out_auto_led)->turn_on();
            id(out_sleep_led)->turn_off();
            id(out_manual_led)->turn_off();
          } else if (mode == "Sleep") {
            id(out_auto_led)->turn_off();
            id(out_sleep_led)->turn_on();
            id(out_manual_led)->turn_off();
          } else if (mode == "Manual") {
            id(out_auto_led)->turn_off();
            id(out_sleep_led)->turn_off();
            id(out_manual_led)->turn_on();
          }
          // Full Speed: animation interval handles the LEDs

  - id: apply_auto_speed
    mode: restart
    then:
      - lambda: |
          if (id(fan_mode)->current_option() != "Auto" || !id(fan_component).state) return;
          float pm25 = id(pm25_sensor).state;
          if (isnan(pm25)) pm25 = 0.0f;
          // Map 0-50 µg/m³ PM2.5 → 16-70% fan speed, clamped
          float pct = 16.0f + (pm25 / 50.0f) * 54.0f;
          if (pct < 16.0f) pct = 16.0f;
          if (pct > 70.0f) pct = 70.0f;
          id(mode_setting_speed) = true;
          auto call = id(fan_component).make_call();
          call.set_speed((int)pct);
          call.perform();
          id(mode_setting_speed) = false;

interval:
  - interval: 300ms
    then:
      - lambda: |
          bool enable = id(led_enable).state && id(fan_component).state;
          if (id(fan_mode)->current_option() != "Full Speed" || !enable) {
            id(animation_step) = 0;
            return;
          }
          id(animation_step) = (id(animation_step) + 1) % 3;
          if (id(animation_step) == 0) {
            id(out_manual_led)->turn_on();
            id(out_sleep_led)->turn_off();
            id(out_auto_led)->turn_off();
          } else if (id(animation_step) == 1) {
            id(out_manual_led)->turn_off();
            id(out_sleep_led)->turn_on();
            id(out_auto_led)->turn_off();
          } else {
            id(out_manual_led)->turn_off();
            id(out_sleep_led)->turn_off();
            id(out_auto_led)->turn_on();
          }

sensor:
  - platform: pm1003ph
    binary_sensor: pm1003ph_pwm_signal
    pm_2_5:
      id: pm25_sensor
      name: "PM1003PH PM2.5"
      web_server:
        sorting_group_id: sorting_group_environmental
      on_value:
        then:
          - script.execute: update_air_quality_leds
          - script.execute: apply_auto_speed

  - platform: sht3xd
    address: 0x44
    temperature:
      name: "Temperature"
      web_server:
        sorting_group_id: sorting_group_environmental
    humidity:
      name: "Humidity"
      web_server:
        sorting_group_id: sorting_group_environmental
    update_interval: 30s

  - platform: pulse_counter
    pin: GPIO23
    id: fan_rpm
    name: "Fan RPM"
    unit_of_measurement: "RPM"
    web_server:
      sorting_group_id: sorting_group_fan
    accuracy_decimals: 0
    update_interval: 2s
    filters:
      - multiply: 0.0625 # 16 pulses per revolution
    on_value:
      then:
        - if:
            condition:
              and:
                - lambda: "return !id(fan_component).state;"
                - lambda: "return x < 50.0f;"
            then:
              - switch.turn_off: unbrake

  - platform: ld2410
    moving_distance:
      name: "Radar Moving Distance"
      web_server:
        sorting_group_id: sorting_group_radar
    still_distance:
      name: "Radar Still Distance"
      web_server:
        sorting_group_id: sorting_group_radar
    moving_energy:
      name: "Radar Moving Energy"
      web_server:
        sorting_group_id: sorting_group_radar
    still_energy:
      name: "Radar Still Energy"
      web_server:
        sorting_group_id: sorting_group_radar
    detection_distance:
      name: "Radar Detection Distance"
      web_server:
        sorting_group_id: sorting_group_radar

text_sensor:
  - platform: template
    name: "Air Quality"
    id: air_quality_text
    web_server:
      sorting_group_id: sorting_group_environmental

binary_sensor:
  - platform: gpio
    name: "LED Enable Button"
    id: led_enable_button
    internal: true
    pin:
      tca9555: tca9555_hub
      number: 1
      mode: INPUT
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_press:
      then:
        - switch.toggle: led_enable

  - platform: gpio
    name: "BT Door"
    id: bt_door
    pin:
      tca9555: tca9555_hub
      number: 5
      mode: INPUT
      inverted: true
    web_server:
      sorting_group_id: sorting_group_leds
    filters:
      - delayed_off: 300ms
    on_state:
      then:
        - if:
            condition:
              binary_sensor.is_off: bt_door
            then:
              - fan.turn_off: fan_component

  - platform: gpio
    name: "Start Button"
    id: start_button
    internal: true
    pin:
      tca9555: tca9555_hub
      number: 14
      mode: INPUT
      inverted: true
    filters:
      - delayed_on: 10ms
      - delayed_off: 10ms
    on_multi_click:
      - timing:
          - ON for at most 400ms
          - OFF for at most 300ms
          - ON for at most 400ms
          - OFF for at least 50ms
        then:
          - if:
              condition:
                lambda: "return !id(fan_component).state;"
              then:
                - fan.turn_on: fan_component
          - select.set:
              id: fan_mode
              option: "Full Speed"
      - timing:
          - ON for at least 1500ms
        then:
          - fan.turn_off: fan_component
      - timing:
          - ON for at most 800ms
          - OFF for at least 350ms
        then:
          - if:
              condition:
                lambda: "return !id(fan_component).state;"
              then:
                - fan.turn_on: fan_component
              else:
                - lambda: |
                    auto* sel = id(fan_mode);
                    auto mode = sel->current_option();
                    if (mode == "Full Speed" || mode == "Manual") sel->make_call().set_option("Auto").perform();
                    else if (mode == "Auto") sel->make_call().set_option("Sleep").perform();
                    else sel->make_call().set_option("Manual").perform();

  - platform: gpio
    name: "Radar Presence"
    pin:
      number: GPIO14
      mode: INPUT
    web_server:
      sorting_group_id: sorting_group_radar
    device_class: occupancy

  - platform: ld2410
    has_target:
      name: "Radar Has Target"
      web_server:
        sorting_group_id: sorting_group_radar
    has_moving_target:
      name: "Radar Has Moving Target"
      web_server:
        sorting_group_id: sorting_group_radar
    has_still_target:
      name: "Radar Has Still Target"
      web_server:
        sorting_group_id: sorting_group_radar

  - platform: gpio
    pin: GPIO5
    id: pm1003ph_pwm_signal
    internal: true

output:
  - platform: ledc
    id: out_fan
    pin: GPIO20
    frequency: 40Hz

  - platform: template
    id: fan_speed_output
    type: float
    write_action:
      - lambda: |
          auto call = id(fan_frequency).make_call();
          call.set_value(40.0f + state * 560.0f);
          call.perform();
          // Only switch to Manual when speed changes while fan was already running
          if (!id(mode_setting_speed) && id(fan_was_on) && id(fan_component).state) {
            id(fan_mode)->make_call().set_option("Manual").perform();
          }

  - platform: gpio
    id: out_led_bad
    pin:
      tca9555: tca9555_hub
      number: 2
      mode: OUTPUT
      inverted: true

  - platform: gpio
    id: out_led_good
    pin:
      tca9555: tca9555_hub
      number: 3
      mode: OUTPUT
      inverted: true

  - platform: gpio
    id: out_led_excellent
    pin:
      tca9555: tca9555_hub
      number: 4
      mode: OUTPUT
      inverted: true

  - platform: gpio
    id: out_sleep_led
    pin:
      tca9555: tca9555_hub
      number: 12
      mode: OUTPUT
      inverted: true

  - platform: gpio
    id: out_manual_led
    pin:
      tca9555: tca9555_hub
      number: 13
      mode: OUTPUT
      inverted: true

  - platform: gpio
    id: out_auto_led
    pin:
      tca9555: tca9555_hub
      number: 11
      mode: OUTPUT
      inverted: true

  - platform: gpio
    id: out_wifi_led
    pin:
      tca9555: tca9555_hub
      number: 15
      mode: OUTPUT
      inverted: true

number:
  - platform: template
    name: "Fan Frequency"
    id: fan_frequency
    internal: true
    min_value: 40
    max_value: 600
    step: 1
    unit_of_measurement: "Hz"
    optimistic: true
    restore_value: true
    on_value:
      then:
        - output.ledc.set_frequency:
            id: out_fan
            frequency: !lambda return x;

select:
  - platform: template
    name: "Mode"
    id: fan_mode
    web_server:
      sorting_group_id: sorting_group_fan
    options:
      - "Auto"
      - "Sleep"
      - "Manual"
      - "Full Speed"
    optimistic: true
    restore_value: true
    initial_option: "Auto"
    on_value:
      then:
        - lambda: |
            if (!id(fan_component).state) return;
            id(mode_setting_speed) = true;
            if (x == "Sleep") {
              auto call = id(fan_component).make_call();
              call.set_speed(11);
              call.perform();
            } else if (x == "Full Speed") {
              auto call = id(fan_component).make_call();
              call.set_speed(90);
              call.perform();
            }
            id(mode_setting_speed) = false;
        - if:
            condition:
              and:
                - lambda: 'return x == "Auto";'
                - lambda: "return id(fan_component).state;"
            then:
              - script.execute: apply_auto_speed
        - script.execute: update_mode_leds

fan:
  - platform: speed
    name: "Fan"
    id: fan_component
    output: fan_speed_output
    web_server:
      sorting_group_id: sorting_group_fan
    on_turn_on:
      - lambda: |
          id(out_fan).set_level(0.5f);
          id(fan_was_on) = true;
      - switch.turn_on: unbrake
      - lambda: |
          id(mode_setting_speed) = true;
          auto mode = id(fan_mode)->current_option();
          if (mode == "Sleep") {
            auto call = id(fan_component).make_call();
            call.set_speed(11);
            call.perform();
          } else if (mode == "Full Speed") {
            auto call = id(fan_component).make_call();
            call.set_speed(90);
            call.perform();
          }
          id(mode_setting_speed) = false;
      - if:
          condition:
            lambda: 'return id(fan_mode)->current_option() == "Auto";'
          then:
            - script.execute: apply_auto_speed
      - script.execute: update_air_quality_leds
      - script.execute: update_mode_leds
    on_turn_off:
      - lambda: |
          id(out_fan).set_level(0.0f);
          id(fan_was_on) = false;
      - script.execute: update_air_quality_leds
      - script.execute: update_mode_leds
      # unbrake stays on until RPM drops below 50 (handled by RPM sensor on_value)

switch:
  - platform: template
    name: "LED Enable"
    id: led_enable
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    web_server:
      sorting_group_id: sorting_group_leds
    on_turn_on:
      - script.execute: update_air_quality_leds
      - script.execute: update_mode_leds
    on_turn_off:
      - script.execute: update_air_quality_leds
      - script.execute: update_mode_leds

  - platform: gpio
    name: "Unbrake"
    id: unbrake
    pin: GPIO21
    internal: true

  - platform: ld2410
    engineering_mode:
      name: LD2410 Engineering mode
    bluetooth:
      name: LD2410 Bluetooth
